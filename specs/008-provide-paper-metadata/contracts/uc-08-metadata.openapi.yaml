openapi: 3.0.3
info:
  title: UC-08 Paper Metadata API
  version: 1.0.0
  description: Create or update paper metadata for a submission.
paths:
  /submissions/{submissionId}/metadata:
    put:
      summary: Save paper metadata
      description: Validate and store paper metadata for a submission.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                author_names:
                  type: array
                  items:
                    type: string
                affiliations:
                  type: array
                  items:
                    type: string
                contact_email:
                  type: string
                abstract:
                  type: string
                keywords:
                  type: array
                  items:
                    type: string
                paper_source:
                  type: string
              required:
                - author_names
                - affiliations
                - contact_email
                - abstract
                - keywords
                - paper_source
      responses:
        "200":
          description: Metadata saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissionId:
                    type: string
                  message:
                    type: string
        "400":
          description: Missing or invalid metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "409":
          description: Submission finalized (metadata locked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Validation or storage failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
